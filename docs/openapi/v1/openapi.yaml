openapi: 3.0.3

info:
  title: CRM Order Management API
  version: 1.0.0
  description: |
    The **CRM Order Management API** enables developers to create, retrieve, update,
    and delete customer orders within a CRM system.

    ## Authentication
    All endpoints require an API key passed in the `X-API-Key` header.

    ## Base URL
    ```
    https://api.example.com/v1
    ```

    ## Rate Limiting
    Requests are limited to **100 per minute** per API key. Exceeding this limit returns a `429 Too Many Requests` response.
  contact:
    name: API Support
    email: api-support@example.com  # Replace with your actual email domain
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com/v1  # Replace 'example.com' with your actual domain
    description: Production server
  - url: http://localhost:8000/v1
    description: "Local development server (default: port 8000)"

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication. Contact support team to obtain a key.

  schemas:
    Order:
      type: object
      required:
        - orderId
        - customerId
        - productName
        - quantity
        - price
        - status
      properties:
        orderId:
          type: string
          description: Unique identifier for the order. Auto-generated by the system.
          example: ORD115
        customerId:
          type: string
          description: Unique identifier for the customer placing the order.
          example: CUST121
        productName:
          type: string
          description: Name of the product being ordered.
          example: Acoustic Guitar
        quantity:
          type: integer
          minimum: 1
          description: Number of units ordered. Must be greater than zero.
          example: 1
        price:
          type: number
          format: float
          minimum: 0
          description: Unit price of the product
          example: 7099.0
        status:
          type: string
          description: Current lifecycle status of the order.
          enum:
            - CREATED
            - PROCESSING
            - SHIPPED
            - DELIVERED
            - CANCELLED
          example: CREATED
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the order was created.
          example: "2026-04-08T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the order was last updated.
          example: "2026-04-10T14:45:00Z"

    CreateOrderRequest:
      type: object
      required:
        - customerId
        - productName
        - quantity
        - price
      properties:
        customerId:
          type: string
          description: Unique identifier for the customer.
          example: CUST121
        productName:
          type: string
          description: Name of the product to order.
          example: Acoustic Guitar
        quantity:
          type: integer
          minimum: 1
          description: Number of units to order.
          example: 1
        price:
          type: number
          format: float
          minimum: 0
          description: Unit price of the product.
          example: 7099.0
        status:
          type: string
          description: Initial status. Defaults to CREATED if not specified.
          enum:
            - CREATED
          example: CREATED

    UpdateOrderRequest:
      type: object
      description: At least one field must be provided for an update.
      properties:
        productName:
          type: string
          description: Updated product name.
          example: Acoustic Guitar Pro
        quantity:
          type: integer
          minimum: 1
          description: Updated quantity.
          example: 2
        price:
          type: number
          format: float
          minimum: 0
          description: Updated unit price.
          example: 14000.0
        status:
          type: string
          description: Updated order status.
          enum:
            - CREATED
            - PROCESSING
            - SHIPPED
            - DELIVERED
            - CANCELLED
          example: SHIPPED

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        total:
          type: integer
          description: Total number of orders matching the query.
          example: 1
        page:
          type: integer
          description: Current page number.
          example: 1
        pageSize:
          type: integer
          description: Number of results per page.
          example: 20

    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          description: Machine-readable error code.
          example: INVALID_REQUEST
        message:
          type: string
          description: Human-readable description of the error.
          example: Missing required fields
        details:
          type: array
          description: Additional details about validation failures.
          items:
            type: object
            properties:
              field:
                type: string
                example: quantity
              issue:
                type: string
                example: Must be greater than zero

  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      description: Unique identifier of the order.
      schema:
        type: string
        example: ORD115

  responses:
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: UNAUTHORIZED
            message: Invalid or missing API key
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: RATE_LIMIT_EXCEEDED
            message: Too many requests. Please retry after 60 seconds.
    InternalServerError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errorCode: INTERNAL_SERVER_ERROR
            message: An unexpected error occurred. Please contact support.

tags:
  - name: Orders
    description: Operations for managing customer orders.

paths:

  /orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: |
        Creates a new order in the CRM system. The `orderId` is auto-generated and returned
        in the response. The initial status is set to `CREATED`.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              customerId: CUST122
              productName: Laptop
              quantity: 1
              price: 75000
              status: CREATED
      responses:
        '201':
          description: Order created successfully.
          headers:
            Location:
              description: URL of the newly created order.
              schema:
                type: string
                example: /v1/orders/ORD116
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                orderId: ORD116
                customerId: CUST122
                productName: Laptop
                quantity: 1
                price: 75000
                status: CREATED
                createdAt: "2026-04-08T10:30:00Z"
                updatedAt: "2026-04-08T10:30:00Z"
        '400':
          description: Invalid input. Required fields are missing or values are invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: INVALID_REQUEST
                message: Missing required fields
                details:
                  - field: customerId
                    issue: This field is required
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - Orders
      summary: List all orders
      description: |
        Retrieves a paginated list of all orders. Use the `status` query parameter
        to filter orders by their lifecycle status.
      operationId: listOrders
      parameters:
        - name: status
          in: query
          required: false
          description: Filter orders by status.
          schema:
            type: string
            enum:
              - CREATED
              - PROCESSING
              - SHIPPED
              - DELIVERED
              - CANCELLED
            example: SHIPPED
        - name: page
          in: query
          required: false
          description: Page number for pagination. Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: pageSize
          in: query
          required: false
          description: Number of results per page. Defaults to 20, maximum 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: Paginated list of orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
              example:
                orders:
                  - orderId: ORD115
                    customerId: CUST121
                    productName: Acoustic Guitar
                    quantity: 1
                    price: 7099.0
                    status: SHIPPED
                    createdAt: "2026-04-07T09:15:00Z"
                    updatedAt: "2026-04-08T12:00:00Z"
                total: 1
                page: 1
                pageSize: 20
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get an order by ID
      description: Retrieves the full details of a specific order by its unique `orderId`.
      operationId: getOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                orderId: ORD115
                customerId: CUST121
                productName: Acoustic Guitar
                quantity: 1
                price: 7099.0
                status: DELIVERED
                createdAt: "2026-04-07T09:15:00Z"
                updatedAt: "2026-04-10T16:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Order not found. The specified orderId does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: ORDER_NOT_FOUND
                message: Order with ID ORD115 was not found
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Orders
      summary: Update an order
      description: |
        Updates one or more fields of an existing order. Only the fields included
        in the request body are updated; all other fields remain unchanged.

        Note: Orders with status DELIVERED or CANCELLED cannot be updated.
      operationId: updateOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
            example:
              status: SHIPPED
      responses:
        '200':
          description: Order updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
              example:
                orderId: ORD115
                customerId: CUST121
                productName: Acoustic Guitar
                quantity: 1
                price: 7099.0
                status: SHIPPED
                createdAt: "2026-04-07T09:15:00Z"
                updatedAt: "2026-04-10T14:00:00Z"
        '400':
          description: Invalid update data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: INVALID_REQUEST
                message: Cannot update a DELIVERED order
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: ORDER_NOT_FOUND
                message: Order with ID ORD115 was not found
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Orders
      summary: Delete an order
      description: |
        Permanently deletes an order from the system. This action is irreversible.

        Note: Only orders with status CREATED or CANCELLED can be deleted.
      operationId: deleteOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '204':
          description: Order deleted successfully. No content is returned.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: ORDER_NOT_FOUND
                message: Order with ID ORD115 was not found
        '409':
          description: Conflict. Order cannot be deleted in its current status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: CONFLICT
                message: Cannot delete an order with status SHIPPED
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/search:
    post:
      tags:
        - Orders
      summary: Search orders with advanced filters
      operationId: searchOrders
      description: |
        Search for orders using flexible filter criteria including status, customer ID, and date ranges.
        Returns a paginated result set. Useful for building dashboards and reports.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: object
                  description: Filter criteria
                  properties:
                    customerId:
                      type: string
                      description: Filter by customer ID
                    status:
                      type: string
                      enum: [CREATED, PROCESSING, SHIPPED, DELIVERED, CANCELLED]
                      description: Filter by order status
                    dateRange:
                      type: object
                      description: Filter orders within a date range (ISO 8601 format)
                      properties:
                        from:
                          type: string
                          format: date-time
                          description: Start date (inclusive)
                        to:
                          type: string
                          format: date-time
                          description: End date (inclusive)
                pagination:
                  type: object
                  properties:
                    page:
                      type: integer
                      default: 1
                      minimum: 1
                      description: Page number for results
                    pageSize:
                      type: integer
                      default: 20
                      minimum: 1
                      maximum: 100
                      description: Number of results per page
            example:
              filters:
                status: SHIPPED
                customerId: CUST121
                dateRange:
                  from: "2026-04-01T00:00:00Z"
                  to: "2026-04-14T23:59:59Z"
              pagination:
                page: 1
                pageSize: 50
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      total:
                        type: integer
                        description: Total matching records
                      totalPages:
                        type: integer
              example:
                data:
                  - orderId: ORD115
                    customerId: CUST121
                    productName: Acoustic Guitar
                    quantity: 1
                    price: 7099.0
                    status: SHIPPED
                    createdAt: "2026-04-08T14:32:00Z"
                    updatedAt: "2026-04-10T09:15:00Z"
                pagination:
                  page: 1
                  pageSize: 50
                  total: 235
                  totalPages: 5
        '400':
          description: Invalid filter parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: INVALID_REQUEST
                message: Invalid date range format
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/bulk-update:
    patch:
      tags:
        - Orders
      summary: Update status for multiple orders
      operationId: bulkUpdateOrders
      description: |
        Update the status of multiple orders in a single request. Useful for bulk operations
        on shipped batches or batch processing. Maximum 100 orders per request.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderIds
                - status
              properties:
                orderIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
                  description: List of order IDs to update (max 100 per request)
                  example: [ORD115, ORD116, ORD117]
                status:
                  type: string
                  enum: [PROCESSING, SHIPPED, DELIVERED, CANCELLED]
                  description: New status for all specified orders
            example:
              orderIds: [ORD115, ORD116, ORD117]
              status: SHIPPED
      responses:
        '200':
          description: Orders updated successfully. Returns summary of successes and failures.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                    description: Number of orders successfully updated
                  failed:
                    type: integer
                    description: Number of orders that failed to update
                  failures:
                    type: array
                    items:
                      type: object
                      properties:
                        orderId:
                          type: string
                          description: Order ID that failed
                        reason:
                          type: string
                          description: Reason for the failure
                    description: Details of failed updates (if any)
              example:
                updated: 98
                failed: 2
                failures:
                  - orderId: ORD999
                    reason: Order not found
                  - orderId: ORD1000
                    reason: Cannot transition from DELIVERED to PROCESSING
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                errorCode: INVALID_REQUEST
                message: orderIds array cannot be empty
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
