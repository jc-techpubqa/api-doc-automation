# GitHub Pages Deployment Workflow
#
# SETUP REQUIRED:
# 1. Enable GitHub Pages in repo settings:
#    Settings → Pages → Source: Deploy from a branch → Branch: gh-pages
# 2. Ensure Actions permissions: Settings → Actions → General →
#    Workflow permissions: "Read and write permissions"
#
# On each push to main:
# 1. Validates OpenAPI spec with Spectral
# 2. Generates Markdown docs from the spec
# 3. Builds MkDocs site
# 4. Deploys to GitHub Pages (main branch only)

name: Validate, Build & Deploy API Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Validate OpenAPI spec with Spectral
  validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Spectral CLI
        run: npm install -g @stoplight/spectral-cli

      - name: Validate OpenAPI spec
        run: spectral lint docs/openapi/v1/openapi.yaml --ruleset .spectral.yaml

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spectral-report
          path: spectral-report.json
          if-no-files-found: ignore

  #  Job 2: Generate docs from OpenAPI spec
  generate:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Run doc generation script
        run: python scripts/generate_docs.py

      - name: Upload generated docs
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: docs/generated-api-doc.md

  # Job 3: Build MkDocs site
  build:
    name: Build MkDocs Site
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material mkdocs-minify-plugin pyyaml

      - name: Download generated docs
        uses: actions/download-artifact@v4
        with:
          name: generated-docs
          path: docs/

      - name: Build MkDocs site
        run: mkdocs build --strict --verbose

      - name: Copy Swagger UI assets into site
        run: |
          mkdir -p site/swagger-ui
          cp docs/swagger-ui/index.html site/swagger-ui/
          cp docs/swagger-ui/swagger-config.js site/swagger-ui/
          mkdir -p site/openapi/v1
          cp docs/openapi/v1/openapi.yaml site/openapi/v1/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  # Job 4: Deploy to GitHub Pages (main branch only)
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
